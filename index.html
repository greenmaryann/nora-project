<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='26' fill='%231F1F1F'/%3E%3C/svg%3E">
<title>Smart PFM — Espacio de producto</title>
<style>
  :root{
    --dark:#1F1F1F;--mid:#5E5E5E;--gray:#8C8C8C;--light:#B3B3B3;
    --bg:#FAFAFA;--white:#FFFFFF;--border:#E4E4E4;--grayL:#F1F1F1;--grayLL:#F7F7F7;
    --sidebar-w:264px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--dark);-webkit-font-smoothing:antialiased;display:flex;}

  /* SIDEBAR */
  .sidebar{width:var(--sidebar-w);flex:none;height:100vh;position:sticky;top:0;background:var(--white);border-right:1px solid var(--border);padding:26px 18px;display:flex;flex-direction:column;overflow-y:auto;}
  .brand{padding:0 8px 22px;border-bottom:1px solid var(--border);margin-bottom:20px;}
  .brand h1{font-size:16px;font-weight:600;letter-spacing:-0.3px;}
  .brand p{font-size:11.5px;color:var(--gray);margin-top:3px;}

  .nav-group{margin-bottom:22px;}
  .nav-group-label{font-size:10px;font-weight:600;letter-spacing:0.6px;text-transform:uppercase;color:var(--light);padding:0 8px;margin-bottom:8px;}
  .nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:9px;font-size:13.5px;font-weight:500;color:var(--mid);cursor:pointer;text-decoration:none;transition:all .12s;margin-bottom:2px;}
  .nav-item:hover{background:var(--grayLL);color:var(--dark);}
  .nav-item.active{background:var(--dark);color:var(--white);}
  .nav-item .ico{width:16px;height:16px;flex:none;opacity:.85;}
  .nav-item.active .ico{opacity:1;}

  .sidebar-foot{margin-top:auto;padding:16px 8px 4px;border-top:1px solid var(--border);font-size:10.5px;color:var(--light);line-height:1.5;}

  /* CONTENT */
  .content{flex:1;height:100vh;overflow:hidden;position:relative;}
  .frame{width:100%;height:100%;border:0;display:block;background:var(--bg);}
  .loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--light);font-size:13px;background:var(--bg);pointer-events:none;opacity:0;transition:opacity .15s;}
  .loading.show{opacity:1;}

  /* MOBILE */
  .menu-btn{display:none;position:fixed;top:14px;left:14px;z-index:30;background:var(--white);border:1px solid var(--border);border-radius:9px;width:40px;height:40px;cursor:pointer;align-items:center;justify-content:center;flex-direction:column;gap:4px;}
  .menu-btn span{display:block;width:17px;height:1.5px;background:var(--dark);}
  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:19;}

  @media(max-width:820px){
    .sidebar{position:fixed;z-index:20;transform:translateX(-100%);transition:transform .2s;box-shadow:2px 0 20px rgba(0,0,0,.08);}
    body.nav-open .sidebar{transform:translateX(0);}
    body.nav-open .overlay{display:block;}
    .menu-btn{display:flex;}
    .content{width:100%;}
    .brand{padding-top:8px;}
  }
</style>
</head>
<body>

<button class="menu-btn" onclick="document.body.classList.toggle('nav-open')" aria-label="Menú">
  <span></span><span></span><span></span>
</button>
<div class="overlay" onclick="document.body.classList.remove('nav-open')"></div>

<aside class="sidebar">
  <div class="brand">
    <h1>Espacio de producto</h1>
    <p>Smart PFM · Mujer Financiera</p>
  </div>

  <nav>
    <div class="nav-group">
      <div class="nav-group-label">Producto</div>
      <a class="nav-item" data-section="scope" href="#scope">
        <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        Scope Mensual
      </a>
      <a class="nav-item" data-section="map" href="#map">
        <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M3 6l6-3 6 3 6-3v15l-6 3-6-3-6 3z"/><path d="M9 3v15M15 6v15"/></svg>
        Product Map
      </a>
    </div>

    <div class="nav-group">
      <div class="nav-group-label">Gestión</div>
      <a class="nav-item" data-section="planning" href="#planning">
        <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        Planificación Semanal
      </a>
    </div>

    <div class="nav-group">
      <div class="nav-group-label">Proceso</div>
      <a class="nav-item" data-section="arquitectura" href="#arquitectura">
        <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M12 2 2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
        Arquitectura
      </a>
      <a class="nav-item" data-section="feedback" href="#feedback">
        <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M21 11.5a8.5 8.5 0 0 1-8.5 8.5c-1.56 0-3.04-.42-4.31-1.16L3 20l1.16-5.19A8.5 8.5 0 1 1 21 11.5z"/></svg>
        Feedback
      </a>
      <a class="nav-item" data-section="componentes" href="#componentes">
        <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><path d="M3.27 6.96 12 12.01l8.73-5.05"/><path d="M12 22.08V12"/></svg>
        Inventario de componentes
      </a>
      <a class="nav-item" data-section="branding" href="#branding">
        <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/></svg>
        Branding
      </a>
    </div>
  </nav>

  <div class="sidebar-foot">
    Mary Ann Villalobos + Enoc Montiel
  </div>
</aside>

<main class="content">
  <div class="loading" id="loading">Cargando…</div>
  <iframe class="frame" id="frame" title="Contenido"></iframe>
</main>

<script>
  const sections = {
    scope:        'scope.html',
    map:          'map.html',
    planning:     'planning.html',
    arquitectura: 'docs.html#arquitectura',
    feedback:     'docs.html#feedback',
    componentes:  'docs.html#componentes',
    branding:     'branding.html'
  };
  const DEFAULT = 'scope';
  const frame = document.getElementById('frame');
  const loading = document.getElementById('loading');

  function go(section, push){
    if(!sections[section]) section = DEFAULT;
    // highlight
    document.querySelectorAll('.nav-item').forEach(n =>
      n.classList.toggle('active', n.dataset.section === section));
    // load — si solo cambia el hash del mismo archivo, no mostrar loading (no hay recarga)
    const nextSrc = sections[section];
    const sameBase = frame.src && frame.src.split('#')[0].endsWith(nextSrc.split('#')[0]);
    if(!sameBase) loading.classList.add('show');
    frame.src = nextSrc;
    // update hash without triggering another load
    if(push && location.hash.slice(1) !== section){
      try { history.replaceState(null, '', '#' + section); }
      catch(e){ /* sandboxed preview blocks replaceState — ignore */ }
    }
    // close mobile nav
    document.body.classList.remove('nav-open');
    document.title = 'Smart PFM — ' + ({scope:'Scope Mensual',map:'Product Map',planning:'Planificación Semanal',arquitectura:'Arquitectura',feedback:'Feedback',componentes:'Componentes',branding:'Branding'}[section]);
  }

  frame.addEventListener('load', () => loading.classList.remove('show'));

  document.querySelectorAll('.nav-item').forEach(n =>
    n.addEventListener('click', e => { e.preventDefault(); go(n.dataset.section, true); }));

  window.addEventListener('hashchange', () => go(location.hash.slice(1), false));

  // initial
  go(location.hash.slice(1) || DEFAULT, true);
</script>
</body>
</html>
